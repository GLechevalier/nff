name: CI / Release

on:
  push:
    branches: [main]

jobs:
  test-and-release:
    # Skip when the push is the bot's own version-bump commit.
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the version commit and tag

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" build twine

      - name: Run tests
        run: pytest tests/

      - name: Bump patch version
        id: bump
        run: |
          python - <<'PYEOF' >> $GITHUB_OUTPUT
          import re, pathlib
          p = pathlib.Path("pyproject.toml")
          text = p.read_text()
          m = re.search(r'version = "(\d+)\.(\d+)\.(\d+)"', text)
          major, minor, patch = m.group(1), m.group(2), int(m.group(3))
          new_version = f"{major}.{minor}.{patch + 1}"
          p.write_text(re.sub(r'version = "\d+\.\d+\.\d+"', f'version = "{new_version}"', text))
          print(f"new_version={new_version}")
          PYEOF

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*

      - name: Commit version bump, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git tag v${{ steps.bump.outputs.new_version }}
          git push origin main --follow-tags
