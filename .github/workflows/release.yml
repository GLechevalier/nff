name: CI / Release

on:
  push:
    branches: [main]

jobs:
  # ── 1. Fast gate ────────────────────────────────────────────────────────────
  test:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nff-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('nff-rs/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - name: Run Rust tests
        run: cargo test
        working-directory: nff-rs

  # ── 2. Bump version + tag ───────────────────────────────────────────────────
  bump-version:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version in pyproject.toml and Cargo.toml
        id: bump
        run: |
          python - <<'PYEOF' >> $GITHUB_OUTPUT
          import re, pathlib

          # pyproject.toml
          p = pathlib.Path("pyproject.toml")
          text = p.read_text()
          m = re.search(r'version = "(\d+)\.(\d+)\.(\d+)"', text)
          major, minor, patch = m.group(1), m.group(2), int(m.group(3))
          new_version = f"{major}.{minor}.{patch + 1}"
          p.write_text(re.sub(r'version = "\d+\.\d+\.\d+"', f'version = "{new_version}"', text, count=1))

          # nff/__init__.py
          ip = pathlib.Path("nff/__init__.py")
          ip.write_text(re.sub(r'__version__ = "\d+\.\d+\.\d+"', f'__version__ = "{new_version}"', ip.read_text()))

          # nff-rs/nff/Cargo.toml
          cp = pathlib.Path("nff-rs/nff/Cargo.toml")
          cp.write_text(re.sub(r'^version = "\d+\.\d+\.\d+"', f'version = "{new_version}"', cp.read_text(), flags=re.MULTILINE))

          print(f"new_version={new_version}")
          PYEOF

      - name: Commit, tag, push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml nff/__init__.py nff-rs/nff/Cargo.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          # Annotated tag (-a): a lightweight tag is NOT pushed by --follow-tags,
          # which left every release untagged and broke `checkout ref: vX` below.
          git tag -a "v${{ steps.bump.outputs.new_version }}" -m "v${{ steps.bump.outputs.new_version }}"
          git push origin main
          git push origin "v${{ steps.bump.outputs.new_version }}"

  # ── 3. Build the pip-installable wheel ──────────────────────────────────────
  # The package is a pure-Python hatchling project, so one universal
  # (py3-none-any) wheel installs everywhere — build it with the standard PyPA
  # build, NOT maturin (maturin expects a Rust/mixed project and failed here).
  build-wheel:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-version.outputs.new_version }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  # ── 4. Build standalone Rust binaries (the single-binary downloads) ─────────
  build-binaries:
    needs: bump-version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary: nff
            asset: nff-linux-x64
          - os: windows-latest
            binary: nff.exe
            asset: nff-windows-x64.exe
          - os: macos-latest
            binary: nff
            asset: nff-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.bump-version.outputs.new_version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - name: Build release binary
        run: cargo build --release
        working-directory: nff-rs
      - name: Stage binary
        shell: bash
        run: cp "nff-rs/target/release/${{ matrix.binary }}" "${{ matrix.asset }}"
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  # ── 5. Publish the wheel to PyPI (keeps `pip install nff` working) ───────────
  publish-pypi:
    needs: [bump-version, build-wheel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          python -m twine upload --skip-existing dist/*

  # ── 6. Create GitHub Release with standalone binaries ──────────────────────
  publish-release:
    needs: [bump-version, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: nff-*
          merge-multiple: true
          path: binaries/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump-version.outputs.new_version }}
          files: binaries/*
          generate_release_notes: true
