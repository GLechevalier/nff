[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "nff"
version = "0.1.0"
description = "Claude Code IoT Bridge — connect Claude to hardware via USB"
requires-python = ">=3.10"
dependencies = [
    "pyserial>=3.5",
    "mcp>=1.0.0",
    "click>=8.0",
    "rich>=13.0",
]

[project.scripts]
nff = "nff.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "black",
    "ruff",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["nff*"]

[tool.black]
line-length = 100

[tool.ruff]
line-length = 100
